{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0"><i class="bi bi-person-plus me-1"></i> Create Account</h5>
      </div>
      <div class="card-body">
        <form method="post" action="{{ url_for('auth.register') }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email (optional)</label>
              <input type="email" name="email" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="fullname" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Contact No</label>
              <input type="text" name="contactno" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Designation</label>
              <input type="text" name="designation" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Control No</label>
              <input type="text" name="controlno" class="form-control">
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check2-circle me-1"></i> Register
            </button>
            <a href="{{ url_for('auth.login') }}" class="small">
              Already have an account? Login
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
