{% extends "base.html" %}
{% block title %}{{ 'Edit Vendor' if row else 'Add Vendor' }} – {{ tender.tender_no }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-1">{{ 'Edit Vendor' if row else 'Add Vendor' }} – {{ tender.tender_no }}</h3>
  <a href="{{ url_for('admin.tender_vendors_list', tenderid=tender.id) }}" class="btn btn-outline-secondary">
    Back to Vendors
  </a>
</div>

<form method="post">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-semibold">Vendor Name</label>
        <input type="text" name="vendorname" class="form-control" required
               value="{{ row.vendor_name if row else '' }}">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">PO No</label>
        <input type="text" name="pono" class="form-control"
               value="{{ row.po_no if row else '' }}">
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">CIF</label>
          <input type="number" step="0.01" name="cif" class="form-control"
                 value="{{ row.cif if row else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Currency</label>
          <input type="text" name="currency" class="form-control" required
                 value="{{ row.currency if row else 'EUR' }}">
        </div>
      </div>

      <div class="text-end mt-3">
        <button type="submit" class="btn btn-primary">
          {{ 'Update' if row else 'Create' }} Vendor
        </button>
      </div>
    </div>
  </div>
</form>
{% endblock %}
